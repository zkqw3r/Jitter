<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jitter - Lobby</title>
		<link rel="stylesheet" href="/style.css" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#141313" />
	</head>
	<body>
		<div class="lobby-bg">
			<div class="lobby-bg-blur1"></div>
			<div class="lobby-bg-blur2"></div>
			<div class="lobby-bg-blur3"></div>
		</div>
		
		<main class="lobby-container">
			<div class="lobby-panel">
				<div class="lobby-logo">
					<h1>JITTER</h1>
				</div>
				
				<div class="lobby-form">
					<input 
						id="roomInput"
						class="lobby-input" 
						placeholder="Enter Room ID/Link..." 
						type="text"
						autocomplete="off"
					/>
					
					<div id="errorMessage" class="lobby-error"></div>
					
					<div class="lobby-buttons">
						<button onclick="createRoom()" class="lobby-btn lobby-btn-primary">
							CREATE ROOM
						</button>
						
						<button onclick="joinRoom()" class="lobby-btn lobby-btn-secondary">
							JOIN ROOM
						</button>
					</div>
				</div>
			</div>
		</main>

		<script>
			function showError(message) {
				const errorEl = document.getElementById("errorMessage");
				errorEl.textContent = message;
				errorEl.classList.add("visible");
				setTimeout(() => {
					errorEl.classList.remove("visible");
				}, 5000);
			}

			async function createRoom() {
				const res = await fetch("/rooms", { method: "POST" });
				const data = await res.json();
				location.href = `/room/${data.room_id}`;
			}

			async function joinRoom() {
				const input = document.getElementById("roomInput").value.trim();
				if (!input) return;

				const uuidRegex = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
				const match = input.match(uuidRegex);
				if (!match) {
					showError("Неверный формат ссылки");
					return;
				}

				const id = match[0];
				const res = await fetch(`/rooms/${id}`);
				if (res.ok) {
					location.href = `/room/${id}`;
				} else {
					showError("Комната не найдена");
				}
			}
		</script>
	</body>
</html>

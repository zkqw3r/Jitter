<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jitter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="videos">
        <div class="video-wrap" id="localWrap">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="avatar" id="localAvatar">🙂</div>
            <div class="video-overlay">
                <button class="fs-btn" onclick="toggleFullscreen('localWrap')">⛶</button>
            </div>
        </div>

        <div class="video-wrap" id="remoteWrap">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="avatar" id="remoteAvatar">👤</div>
            <div class="video-overlay">
                <button class="fs-btn" onclick="toggleFullscreen('remoteWrap')">⛶</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="micBtn"  onclick="toggleMic()">🎤</button>
        <button id="camBtn"  onclick="toggleCam()">📷</button>
        <button id="muteBtn" onclick="toggleMute()">🔊</button>
        <button id="endBtn"  onclick="endCall()">📵</button>
    </div>

    <script src="app.js"></script>
</body>
</html>

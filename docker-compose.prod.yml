services:
    caddy:
        image: caddy:alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        command: caddy reverse-proxy --from ${DOMAIN} --to app:8080
        depends_on:
            - app

    app:
        build: 
            context: .
            dockerfile: Dockerfile.prod
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - FRONTEND_DIR=./frontend
            - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
            - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
            - TURN_USERNAME=${TURN_USERNAME:-}
            - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
            - TURN_SECRET=${TURN_SECRET:-}
            - TURN_TTL_SECONDS=${TURN_TTL_SECONDS:-3600}
            - TURN_URL_UDP=${TURN_URL_UDP:-}
            - TURN_URL_TCP=${TURN_URL_TCP:-}
            - TURN_URL_TLS=${TURN_URL_TLS:-}
            - STUN_URL=${STUN_URL:-}
            - GIN_MODE=release
        depends_on:
            db:
                condition: service_healthy
        restart: unless-stopped
        read_only: true
        tmpfs:
            - /tmp
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL

    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: jitter
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: jitter
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/initdb:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U jitter"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true

    turn:
        image: coturn/coturn:latest
        network_mode: host
        command:
            - -c=/etc/coturn/turnserver.conf
            - --static-auth-secret=${TURN_SECRET}
            - --realm=${TURN_REALM}
            - --external-ip=${TURN_EXTERNAL_IP}
        volumes:
            - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
        restart: unless-stopped

volumes:
    postgres_data: